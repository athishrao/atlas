<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }
    header { background: #1a1a2e; color: #fff; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
    header a { color: #fff; text-decoration: none; font-weight: bold; font-size: 1.2rem; }
    header nav { margin-left: auto; }
    header nav a { color: #ccc; text-decoration: none; margin-left: 16px; }
    header nav a:hover { color: #fff; }
    main { max-width: 900px; margin: 32px auto; padding: 0 16px; }
    .card { background: #fff; border-radius: 8px; padding: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #eee; }
    th { background: #f9f9f9; font-size: .85rem; color: #666; text-transform: uppercase; letter-spacing: .05em; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    a { color: #3b82f6; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .btn { display: inline-block; padding: 8px 16px; border-radius: 6px; font-size: .9rem; cursor: pointer; border: none; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-sm { padding: 4px 10px; font-size: .8rem; }
    .btn-danger { background: #ef4444; color: #fff; }
    input, textarea { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: .95rem; margin-top: 4px; }
    label { font-size: .9rem; color: #555; display: block; margin-top: 14px; }
    .form-actions { margin-top: 20px; display: flex; gap: 10px; }
    .badge { display: inline-block; background: #e0f2fe; color: #0369a1; border-radius: 999px; padding: 2px 10px; font-size: .75rem; }
    .search-bar { display: flex; gap: 8px; margin-bottom: 20px; }
    .search-bar input { flex: 1; }
    h1 { font-size: 1.4rem; margin-bottom: 20px; }
  </style>
</head>
<body>
  <header>
    <a href="/">{{ prefix }}/</a>
    <nav>
      <a href="/create">+ New link</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
