{% extends "base.html" %}
{% block title %}{{ app_name }} — edit {{ prefix }}/{{ link.short }}{% endblock %}
{% block content %}
<div class="card" style="max-width:520px">
  <h1>Edit {{ prefix }}/{{ link.short }}</h1>
  <form method="post" action="/edit/{{ link.short }}">
    <label>Destination URL
      <input name="url" type="text" value="{{ link.url }}" required>
    </label>
    <label>Description
      <input name="description" value="{{ link.description }}">
    </label>
    <div class="form-actions">
      <button class="btn btn-primary" type="submit">Save</button>
      <a class="btn" style="background:#eee;color:#333" href="/">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
