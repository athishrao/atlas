{% extends "base.html" %}
{% block title %}tn/{{ link.short }}{% endblock %}
{% block content %}
<div class="card" style="max-width:520px;text-align:center;padding:40px">
  <p style="color:#888;font-size:.9rem;margin-bottom:12px">tn/{{ link.short }}</p>
  <h1 style="margin-bottom:8px">{{ link.description or link.short }}</h1>
  <p id="path" style="color:#888;font-size:.85rem;margin-bottom:28px;word-break:break-all">{{ link.url }}</p>
  <button class="btn btn-primary" onclick="copyPath()" id="copy-btn" style="font-size:1rem;padding:12px 28px">Copy path</button>
  <p style="color:#aaa;font-size:.8rem;margin-top:20px">
    Paste into Finder (⌘⇧G), Explorer, or a new browser tab.
  </p>
  <script>
    function copyPath() {
      const text = document.getElementById('path').textContent.trim();
      const btn = document.getElementById('copy-btn');
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(() => flash(btn));
      } else {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        flash(btn);
      }
    }
    function flash(btn) {
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy path', 2000);
    }
  </script>
</div>
{% endblock %}
