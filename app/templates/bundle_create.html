{% extends "base.html" %}
{% block title %}{{ app_name }} — new bundle{% endblock %}
{% block nav_bundles_active %}active{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <div class="section-header"><span class="section-title">New Bundle</span></div>
    <div class="section-desc">Group links under a single short name</div>
  </div>
</div>

<div class="card" style="max-width:620px">
  <form method="post" action="/bundles/create">
    <div class="form-row">
      <div class="form-field">
        <label>Short Name</label>
        <input class="form-input" name="short" type="text" placeholder="onboarding" required pattern="[a-z0-9\-]{1,50}" autofocus>
      </div>
      <div class="form-field">
        <label>Display Name</label>
        <input class="form-input" name="name" type="text" placeholder="Onboarding Kit" required>
      </div>
    </div>
    <div class="form-row">
      <div class="form-field">
        <label>Icon (emoji)</label>
        <input class="form-input" name="icon" type="text" placeholder="📦" maxlength="4" style="font-size:20px">
      </div>
      <div class="form-field">
        <label>Color Theme</label>
        <select class="form-input" name="color">
          <option value="default">Green (default)</option>
          <option value="cyan">Cyan</option>
          <option value="amber">Amber</option>
          <option value="purple">Purple</option>
        </select>
      </div>
    </div>
    <div class="form-field">
      <label>Description</label>
      <input class="form-input" name="description" type="text" placeholder="Everything a new hire needs on day one">
    </div>
    <div class="form-field">
      <label>Links — type short names, separated by commas</label>
      <input class="form-input" name="link_shorts" id="linkShortsInput" type="text" placeholder="handbook, standup, deploy">
      <div id="linkPreview" style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px"></div>
    </div>
    <div style="margin-top:8px">
      <div style="font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px">Or pick from existing links</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;max-height:120px;overflow-y:auto">
        {% for link in all_links %}
        <button type="button" class="link-chip" data-short="{{ link.short }}" onclick="addLink('{{ link.short }}')" title="{{ link.url }}">{{ link.short }}</button>
        {% endfor %}
      </div>
    </div>
    <div class="form-actions" style="margin-top:24px">
      <button type="submit" class="btn btn-primary">Create Bundle</button>
      <a class="btn btn-ghost" href="/bundles">Cancel</a>
    </div>
  </form>
</div>

<style>
.link-chip {
  display:inline-flex;align-items:center;padding:3px 10px;border-radius:4px;
  font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;
  background:var(--surface2);border:1px solid var(--border2);color:var(--muted);transition:all .15s;
}
.link-chip:hover,.link-chip.selected { background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.4);color:var(--accent); }
.link-tag {
  display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:4px;
  font-size:11px;font-family:'DM Mono',monospace;
  background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);color:var(--accent);
}
.link-tag button { background:none;border:none;color:var(--muted);cursor:pointer;padding:0;font-size:10px;line-height:1; }
.link-tag button:hover { color:var(--danger); }
</style>

<script>
let selectedLinks = [];

function renderPreview() {
  const preview = document.getElementById('linkPreview');
  preview.innerHTML = selectedLinks.map(s =>
    `<span class="link-tag">${s} <button onclick="removeLink('${s}')" type="button">✕</button></span>`
  ).join('');
  document.getElementById('linkShortsInput').value = selectedLinks.join(', ');
  document.querySelectorAll('.link-chip').forEach(c => {
    c.classList.toggle('selected', selectedLinks.includes(c.dataset.short));
  });
}

function addLink(short) {
  if (!selectedLinks.includes(short)) { selectedLinks.push(short); renderPreview(); }
}

function removeLink(short) {
  selectedLinks = selectedLinks.filter(s => s !== short); renderPreview();
}

// Allow typing directly in input
document.getElementById('linkShortsInput').addEventListener('input', function() {
  selectedLinks = this.value.split(',').map(s => s.trim()).filter(Boolean);
  document.querySelectorAll('.link-chip').forEach(c => {
    c.classList.toggle('selected', selectedLinks.includes(c.dataset.short));
  });
});
</script>
{% endblock %}
