{% extends "base.html" %}
{% block title %}{{ app_name }} — new link{% endblock %}
{% block nav_links_active %}{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <div class="section-header">
      <span class="section-title">New Link</span>
    </div>
    <div class="section-desc">Create a short name that redirects anywhere</div>
  </div>
</div>

<div class="card" style="max-width:560px">
  <form method="post" action="/create">
    <div class="form-row">
      <div class="form-field">
        <label>Short Name</label>
        <input class="form-input" name="short" value="{{ short }}" type="text" placeholder="standup" required pattern="[a-z0-9\-]{1,50}" autofocus>
      </div>
      <div class="form-field">
        <label>Destination URL</label>
        <input class="form-input" name="url" type="text" placeholder="https://… or file:///path/to/file" required>
      </div>
    </div>
    <div class="form-field" style="margin-bottom:0">
      <label>Description (optional)</label>
      <input class="form-input" name="description" type="text" placeholder="What is this link?">
    </div>
    <div class="form-actions" style="margin-top:20px">
      <button type="submit" class="btn btn-primary">Create Link</button>
      <a class="btn btn-ghost" href="/">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
