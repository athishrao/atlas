services:
  app:
    build: .
    ports:
      - "80:10710"
    environment:
      - APP_NAME=atlas
      - BASE_URL=http://atlas
      - DATABASE_URL=sqlite:///./data/atlas.db
      - ATLAS_ADMINS=${ATLAS_ADMINS:-}
      - DEBUG=true
    volumes:
      - ./data:/app/data
    restart: unless-stopped
